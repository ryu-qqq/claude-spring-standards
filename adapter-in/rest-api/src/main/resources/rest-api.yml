# ============================================================
# REST API Adapter 공통 설정
# ============================================================
# 환경별 설정은 rest-api-{profile}.yml 참조
# - rest-api-local.yml: 로컬 개발 환경
# - rest-api-prod.yml: 운영 환경
#
# ⚠️ 인증 아키텍처: Gateway Only
# - JWT 검증: API Gateway에서 처리
# - 각 서비스: Gateway가 전달하는 헤더(X-User-Id, X-User-Roles)만 읽음
# - JWT secret/Public Key: 이 파일에서 관리하지 않음
#
# @since 1.0.0
# ============================================================

# ============================================================
# Error Response Configuration (RFC 7807)
# ============================================================
# @see com.ryuqq.adapter.in.rest.common.controller.GlobalExceptionHandler
api:
  error:
    # 에러 타입 문서 베이스 URL
    base-url: about:blank
    use-about-blank: true

# ============================================================
# Security Configuration (Gateway 위임 모델)
# ============================================================
# ⚠️ JWT 검증은 Gateway에서 처리
# 이 서비스는 Gateway가 전달하는 인증 헤더만 읽음
security:
  # Gateway에서 전달받는 인증 헤더 설정
  gateway:
    enabled: true
    user-id-header: X-User-Id
    user-roles-header: X-User-Roles

  # Cookie 설정 (로그아웃 등에서 사용)
  cookie:
    domain: ${COOKIE_DOMAIN:localhost}
    secure: ${COOKIE_SECURE:false}
    same-site: lax

# ============================================================
# API Documentation (Springdoc OpenAPI)
# ============================================================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

  packages-to-scan:
    - com.ryuqq.adapter.in.rest

  default-consumes-media-type: application/json
  default-produces-media-type: application/json

  cache:
    disabled: true
