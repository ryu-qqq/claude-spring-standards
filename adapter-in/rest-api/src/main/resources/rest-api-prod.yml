# ============================================================
# REST API Adapter 운영 환경 설정
# ============================================================
# 활성화: spring.profiles.active=prod
#
# ⚠️ 보안 필수 사항:
# - Gateway만 이 서비스에 접근 가능 (네트워크 정책으로 강제)
# - 모든 민감 정보는 환경 변수로 관리
# - HTTPS 필수
# ============================================================

security:
  # 운영에서는 Gateway 인증 필수
  gateway:
    enabled: true
    user-id-header: X-User-Id
    user-roles-header: X-User-Roles

  cookie:
    domain: ${COOKIE_DOMAIN}
    secure: true
    same-site: strict

  # ⚠️ 운영에서 CORS는 Gateway에서 처리
  # 이 서비스는 내부망에서만 접근 가능하므로 CORS 설정 불필요
  cors:
    enabled: false

# ============================================================
# API Documentation (운영: 환경변수로 제어)
# ============================================================
# 기본 비활성화, 필요시 SWAGGER_ENABLED=true로 활성화
# 활성화 시 Spring Security로 접근 제한 필요
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
  cache:
    disabled: false

# ============================================================
# Error Response (운영: 상세 URL 제공)
# ============================================================
api:
  error:
    base-url: ${API_ERROR_DOCS_URL:https://api.example.com/problems}
    use-about-blank: false

# ============================================================
# Logging (운영: 최소화)
# ============================================================
logging:
  level:
    com.ryuqq.adapter.in.rest: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
